name: MemAura Python SDK CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install verification dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade "pip<25" "setuptools>=61" wheel
          python -m pip install ".[dev]" "build>=1.2,<1.3" "twine>=5,<6"
      - name: Test and compile
        run: |
          set -euo pipefail
          python -m pytest -q
          PYTHONPYCACHEPREFIX=/tmp/memaura-pyc python -m compileall -q memaura tests
      - name: Build and validate distributions
        run: |
          set -euo pipefail
          rm -rf build dist
          python -m build
          python -m twine check dist/*
      - name: Smoke test wheel
        run: |
          set -euo pipefail
          smoke_dir="$(mktemp -d)"
          python -m venv "$smoke_dir/venv"
          "$smoke_dir/venv/bin/python" -m pip install --quiet --force-reinstall dist/*.whl
          "$smoke_dir/venv/bin/python" - <<'PY'
          import memaura
          from memaura import Memory, SearchResult

          assert memaura.__version__
          print(Memory.__name__, SearchResult.__name__)
          PY
